<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .chat-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 700px;
    }

    .chat-header {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      padding: 20px 25px;
      color: white;
      text-align: center;
      position: relative;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-header h2 {
      font-size: 1.8em;
      font-weight: 600;
      margin: 0;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 3px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 70%;
      word-wrap: break-word;
      position: relative;
      animation: fadeIn 0.3s ease-in;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .sent {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      position: relative;
    }

    .sent::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: -8px;
      width: 0;
      height: 0;
      border-left: 8px solid #00f2fe;
      border-bottom: 8px solid transparent;
    }

    .received {
      background: white;
      color: #2d3748;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      border: 1px solid #e2e8f0;
      position: relative;
    }

    .received::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -8px;
      width: 0;
      height: 0;
      border-right: 8px solid white;
      border-bottom: 8px solid transparent;
    }

    .msg-text {
      font-size: 1em;
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .msg-time {
      font-size: 0.75em;
      opacity: 0.8;
      display: block;
      text-align: right;
      margin-top: 5px;
    }

    .received .msg-time {
      color: #718096;
    }

    .sent .msg-time {
      color: rgba(255, 255, 255, 0.9);
    }

    .input-section {
      padding: 20px 25px;
      background: white;
      border-top: 1px solid #e2e8f0;
    }

    .message-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 25px;
      font-size: 1em;
      outline: none;
      transition: all 0.3s ease;
      background: #f8fafc;
    }

    .message-input:focus {
      border-color: #4facfe;
      background: white;
      box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
    }

    .send-button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
    }

    .send-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    }

    .send-button:active {
      transform: translateY(0);
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      margin-top: 20px;
      align-self: flex-start;
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
    }

    .empty-chat {
      text-align: center;
      padding: 40px 20px;
      color: #718096;
    }

    .empty-chat .icon {
      font-size: 3em;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .empty-chat h3 {
      font-size: 1.2em;
      margin-bottom: 8px;
      color: #4a5568;
    }

    .empty-chat p {
      font-size: 0.9em;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .chat-container {
        height: 95vh;
        border-radius: 10px;
      }

      .chat-header {
        padding: 15px 20px;
      }

      .chat-header h2 {
        font-size: 1.5em;
      }

      .messages-container {
        padding: 15px;
      }

      .msg {
        max-width: 85%;
        padding: 10px 14px;
      }

      .input-section {
        padding: 15px 20px;
      }

      .message-form {
        gap: 8px;
      }

      .message-input {
        padding: 10px 14px;
        font-size: 0.9em;
      }

      .send-button {
        padding: 10px 16px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    
    <!-- ✅ Chat header -->
    <div class="chat-header">
      <h2>💬 Chat</h2>
    </div>

    <!-- ✅ Messages list -->
    <div class="messages-container">
      {% for msg in messages %}
        <div class="msg {% if msg.sender_id == session['user_id'] %}sent{% else %}received{% endif %}">
          <div class="msg-text">{{ msg.text }}</div>
          <small class="msg-time">{{ msg.created_at }}</small>
        </div>
      {% else %}
        <div class="empty-chat">
          <div class="icon">💬</div>
          <h3>Start the conversation</h3>
          <p>Send your first message to begin chatting!</p>
        </div>
      {% endfor %}
    </div>

    <!-- ✅ Input section -->
    <div class="input-section">
      <form action="{{ url_for('send_message') }}" method="post" class="message-form">
        <input type="hidden" name="room_id" value="{{ room_id }}">
        <input type="hidden" name="receiver_id" value="{{ other_user_id }}">
        <input type="text" name="text" placeholder="Type your message..." class="message-input" required>
        <button type="submit" class="send-button">Send</button>
      </form>

      <!-- ✅ Back to inbox link -->
      <a href="{{ url_for('messages_inbox') }}" class="back-button">
        ⬅ Back to Inbox
      </a>
    </div>

  </div>
</body>

</html>
