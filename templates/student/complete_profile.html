<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - RoomieConnect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006A4E 0%, #008B5A 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #006A4E 0%, #008B5A 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-100px); }
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            width: 80%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .form-container {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #006A4E;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #FFA500;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: #006A4E;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 106, 78, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .radio-option:hover {
            border-color: #006A4E;
            background: white;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #006A4E;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            color: #006A4E;
            font-weight: 600;
        }

        .radio-option:has(input[type="radio"]:checked) {
            border-color: #006A4E;
            background: rgba(0, 106, 78, 0.05);
        }

        .budget-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .range-group {
            margin-bottom: 20px;
        }

        .range-slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .range-slider::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #006A4E, #008B5A);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 106, 78, 0.3);
        }

        .range-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #006A4E, #008B5A);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 8px rgba(0, 106, 78, 0.3);
        }

        .range-value {
            text-align: center;
            font-weight: 600;
            color: #006A4E;
            margin-top: 8px;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            border: 2px dashed #006A4E;
            border-radius: 12px;
            background: rgba(0, 106, 78, 0.05);
            color: #006A4E;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .file-upload:hover .file-upload-label {
            background: rgba(0, 106, 78, 0.1);
            border-color: #008B5A;
        }

        .file-upload-label i {
            font-size: 1.5rem;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #006A4E 0%, #008B5A 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 106, 78, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            z-index: 2;
        }

        .step-indicator {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .form-container {
                padding: 30px 20px;
            }

            .budget-range {
                grid-template-columns: 1fr;
            }

            .radio-group {
                flex-direction: column;
            }

            .logo {
                position: static;
                text-align: center;
                margin-bottom: 10px;
            }

            .step-indicator {
                position: static;
                margin: 10px auto 0;
                display: inline-block;
            }
        }

        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            color: #006A4E;
            margin-left: 5px;
        }

        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            z-index: 1000;
            opacity: 1;
        }

        .tooltip::after {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-home"></i> RoomieConnect
            </div>
            <div class="step-indicator">
                Step 2 of 3
            </div>
            <h1>Complete Your Profile</h1>
            <p>Help us find the perfect room and roommate for you</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="form-container">
            <form method="POST" enctype="multipart/form-data">
                <!-- Personal Information Section -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fas fa-user"></i>
                        Personal Information
                    </h3>
                    
                    <div class="form-group">
                        <label class="form-label">
                            Gender
                            <span class="tooltip" data-tooltip="Required for room matching based on preferences">
                                <i class="fas fa-info-circle"></i>
                            </span>
                        </label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="gender" value="male" required>
                                <span class="radio-label">
                                    <i class="fas fa-male"></i> Male
                                </span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="gender" value="female" required>
                                <span class="radio-label">
                                    <i class="fas fa-female"></i> Female
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control" min="18" max="35" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="03XX-XXXXXXX" required>
                        </div>
                    </div>
                </div>

                <!-- Location & Institute Section -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fas fa-map-marker-alt"></i>
                        Location & Institute
                    </h3>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <select name="city" class="form-control" required>
                                <option value="">Select your city</option>
                                <option value="Lahore">Lahore</option>
                                <option value="Karachi">Karachi</option>
                                <option value="Islamabad">Islamabad</option>
                                <option value="Rawalpindi">Rawalpindi</option>
                                <option value="Faisalabad">Faisalabad</option>
                                <option value="Multan">Multan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Institute</label>
                            <select name="institute_id" class="form-control" required>
                                <option value="">Select your institute</option>
                                {% for inst in institutes %}
                                    <option value="{{ inst.id }}">{{ inst.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Budget Section -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fas fa-wallet"></i>
                        Budget Range
                    </h3>
                    
                    <div class="budget-range">
                        <div class="form-group">
                            <label class="form-label">Minimum Budget (PKR)</label>
                            <input type="number" name="budget_min" class="form-control" placeholder="15000" min="5000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Maximum Budget (PKR)</label>
                            <input type="number" name="budget_max" class="form-control" placeholder="25000" min="5000" required>
                        </div>
                    </div>
                </div>

                <!-- Preferences Section -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fas fa-cog"></i>
                        Living Preferences
                    </h3>
                    
                    <div class="range-group">
                        <label class="form-label">Cleanliness Level</label>
                        <input type="range" name="cleanliness_level" min="1" max="10" value="5" class="range-slider" oninput="updateRangeValue('cleanliness', this.value)">
                        <div class="range-value" id="cleanliness-value">5 - Moderate</div>
                    </div>

                    <div class="range-group">
                        <label class="form-label">Noise Tolerance</label>
                        <input type="range" name="noise_tolerance" min="1" max="10" value="5" class="range-slider" oninput="updateRangeValue('noise', this.value)">
                        <div class="range-value" id="noise-value">5 - Moderate</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Smoking Preference</label>
                        <select name="smoking_preference" class="form-control">
                            <option value="non-smoker">Non-smoker</option>
                            <option value="smoker">Smoker</option>
                            <option value="no-preference">No Preference</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tell us about yourself</label>
                        <textarea name="bio" class="form-control" rows="4" placeholder="Write a brief description about yourself, your interests, and what you're looking for in a roommate..." maxlength="500"></textarea>
                    </div>
                </div>

                <!-- Documents Section -->
                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fas fa-upload"></i>
                        Upload Documents
                    </h3>
                    
                    <div class="form-group">
                        <label class="form-label">Profile Picture</label>
                        <div class="file-upload">
                            <input type="file" name="profile_picture" accept="image/*" required>
                            <div class="file-upload-label">
                                <i class="fas fa-camera"></i>
                                <span>Click to upload your photo</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Student ID Card</label>
                        <div class="file-upload">
                            <input type="file" name="student_card_image" accept="image/*" required>
                            <div class="file-upload-label">
                                <i class="fas fa-id-card"></i>
                                <span>Upload your student ID card</span>
                            </div>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="user_id" value="{{ user_id }}">
                <button type="submit" class="submit-btn">
                    <i class="fas fa-check"></i>
                    Complete Profile Setup
                </button>
            </form>
        </div>
    </div>

    <script>
        function updateRangeValue(type, value) {
            const labels = {
                1: 'Very Low',
                2: 'Low',
                3: 'Below Average',
                4: 'Moderate-',
                5: 'Moderate',
                6: 'Moderate+',
                7: 'Above Average',
                8: 'High',
                9: 'Very High',
                10: 'Extremely High'
            };
            
            document.getElementById(type + '-value').textContent = value + ' - ' + labels[value];
        }

        // File upload preview
        document.querySelectorAll('input[type="file"]').forEach(input => {
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const label = this.parentElement.querySelector('.file-upload-label span');
                    label.textContent = file.name;
                    label.style.color = '#006A4E';
                }
            });
        });

        // Form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            const budgetMin = parseInt(document.querySelector('input[name="budget_min"]').value);
            const budgetMax = parseInt(document.querySelector('input[name="budget_max"]').value);
            
            if (budgetMin >= budgetMax) {
                e.preventDefault();
                alert('Maximum budget must be greater than minimum budget');
                return;
            }
        });

        // Initialize range values
        updateRangeValue('cleanliness', 5);
        updateRangeValue('noise', 5);
    </script>
</body>
</html>
