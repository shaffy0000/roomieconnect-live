<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join RoomieConnect - Find Your Perfect Living Space</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    .bg-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .shape {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 60%;
      right: 15%;
      animation-delay: 2s;
    }

    .shape:nth-child(3) {
      width: 60px;
      height: 60px;
      bottom: 20%;
      left: 20%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    /* Main container */
    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px rgba(102, 126, 234, 0.3)); }
      to { filter: drop-shadow(0 0 15px rgba(102, 126, 234, 0.6)); }
    }

    .subtitle {
      color: #64748b;
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Form styles */
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1e293b;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    .form-input:hover, .form-select:hover {
      border-color: #cbd5e1;
    }

    /* Role selector with custom styling */
    .role-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .role-option {
      position: relative;
    }

    .role-radio {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .role-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .role-card:hover {
      border-color: #667eea;
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
    }

    .role-radio:checked + .role-card {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
    }

    .role-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .role-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .role-desc {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Login link */
    .login-link {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
    }

    .login-link p {
      color: #64748b;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .login-link a:hover {
      color: #764ba2;
      text-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .container {
        margin: 1rem;
        padding: 2rem;
      }

      .logo {
        font-size: 2rem;
      }

      .role-container {
        grid-template-columns: 1fr;
      }
    }

    /* Loading animation for form submission */
    .loading {
      position: relative;
      pointer-events: none;
    }

    .loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      transform: translate(-50%, -50%);
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Enhanced focus indicators for accessibility */
    .form-input:focus-visible, .form-select:focus-visible, .submit-btn:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="container">
    <div class="header">
      <div class="logo">RoomieConnect</div>
      <div class="subtitle">Find your perfect living space</div>
    </div>

    <form action="/signup" method="POST" id="signupForm">
      <div class="form-group">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" id="full_name" name="full_name" class="form-input" required placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" required placeholder="Create a secure password">
      </div>

      <div class="form-group">
        <label class="form-label">Choose Your Role</label>
        <div class="role-container">
          <div class="role-option">
            <input type="radio" id="student" name="role" value="student" class="role-radio" required>
            <label for="student" class="role-card">
              <div class="role-icon">🎓</div>
              <div class="role-title">Student</div>
              <div class="role-desc">Looking for accommodation</div>
            </label>
          </div>
          <div class="role-option">
            <input type="radio" id="owner" name="role" value="owner" class="role-radio" required>
            <label for="owner" class="role-card">
              <div class="role-icon">🏠</div>
              <div class="role-title">Owner</div>
              <div class="role-desc">Offering accommodation</div>
            </label>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Create Account
      </button>
    </form>

    <div class="login-link">
      <p>Already have an account? <a href="/login">Sign in here</a></p>
    </div>
  </div>

  <script>
    // Enhanced form interactions
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.classList.add('loading');
      submitBtn.innerHTML = 'Creating Account...';
    });

    // Add floating label effect
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', function() {
        if (this.value === '') {
          this.parentElement.classList.remove('focused');
        }
      });
    });

    // Add smooth transitions when role is selected
    document.querySelectorAll('.role-radio').forEach(radio => {
      radio.addEventListener('change', function() {
        document.querySelectorAll('.role-card').forEach(card => {
          card.style.transform = 'translateY(0)';
        });
        this.nextElementSibling.style.transform = 'translateY(-5px)';
      });
    });

    // Add particle effect on form submission
    function createParticles() {
      const colors = ['#667eea', '#764ba2', '#ffffff'];
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'absolute';
        particle.style.width = Math.random() * 8 + 4 + 'px';
        particle.style.height = particle.style.width;
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.borderRadius = '50%';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.opacity = '0.8';
        particle.style.animation = `float ${Math.random() * 3 + 2}s ease-in-out infinite`;
        particle.style.zIndex = '1';
        document.querySelector('.bg-shapes').appendChild(particle);
        
        setTimeout(() => {
          particle.remove();
        }, 5000);
      }
    }

    // Trigger particles on successful form interaction
    document.querySelectorAll('.form-input, .role-radio').forEach(element => {
      element.addEventListener('focus', () => {
        if (Math.random() > 0.7) createParticles();
      });
    });
  </script>
</body>
</html>
